<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANGUARD - SECURE LOGIN</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link id="bootstrap-link" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .auth-card {
      max-width: 400px;
    }
  </style>
</head>
<body class="no-scroll">

  <main class="scrollable-content" style="--header-height: 0px;">
    <div class="auth-toggles">
    <button class="theme-toggle btn" aria-label="Toggle Theme"><i class="bi bi-moon-fill"></i></button>
    <button class="rtl-toggle btn" aria-label="Toggle RTL"><i class="bi bi-translate"></i></button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-card shadow-lg text-center">
      <a href="index.html" title="Back to Site"><img src="assets/images/logo.svg" alt="Vanguard Logo" class="mb-4" style="height: 45px;"></a>
      <h3 class="fw-bold mb-1">Secure Login</h3>
      <p class="text-muted small mb-4">Operations Portal Access</p>

      <div class="d-flex gap-2 mb-4">
        <button class="btn btn-outline-secondary w-100 rounded-0 py-2 small d-flex align-items-center justify-content-center gap-2"><i class="bi bi-google"></i> Google</button>
        <button class="btn btn-outline-secondary w-100 rounded-0 py-2 small d-flex align-items-center justify-content-center gap-2"><i class="bi bi-linkedin"></i> LinkedIn</button>
      </div>

      <div class="d-flex align-items-center my-4">
        <div class="flex-grow-1 border-bottom border-light border-opacity-10"></div>
        <div class="px-3 x-small text-muted text-uppercase fw-bold tracking-wider" style="font-size: 0.6rem;">OR SECURE KEY</div>
        <div class="flex-grow-1 border-bottom border-light border-opacity-10"></div>
      </div>

      <form action="dashboard.html" method="GET">
        <div class="mb-3 text-start">
          <label class="form-label text-muted small fw-bold">Operator ID / Email</label>
          <div class="input-group border border-secondary border-opacity-25">
            <span class="input-group-text bg-transparent border-0"><i class="bi bi-person text-muted"></i></span>
            <input type="text" class="form-control bg-transparent border-0 ps-0" placeholder="e.g. V-7742" required>
          </div>
        </div>
        <div class="mb-4 text-start">
          <label class="form-label text-muted small fw-bold">Security Key</label>
          <div class="input-group border border-secondary border-opacity-25">
            <span class="input-group-text bg-transparent border-0"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" class="form-control bg-transparent border-0 ps-0" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-brand w-100 py-2 fw-bold rounded-0 mb-3">AUTHORIZE ACCESS</button>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input shadow-none" type="checkbox" id="remember">
            <label class="form-check-label text-muted x-small" for="remember">Keep session active</label>
          </div>
          <a href="#" class="text-muted x-small text-decoration-none hover-primary">Lost keys?</a>
        </div>

        <p class="text-muted small mb-0">New recruit? <a href="register.html" class="text-primary-brand text-decoration-none">Create Account</a></p>
      </form>
    </div>
  </div>

  </main>
  <script src="assets/js/main.js"></script>
</body>
</html>
