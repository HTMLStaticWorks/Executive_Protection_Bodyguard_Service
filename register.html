<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANGUARD - RECRUIT REGISTRATION</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link id="bootstrap-link" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 500px;
      padding: 2.5rem;
      position: relative;
    }
    .auth-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary-brand), transparent);
    }
    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: var(--primary-brand);
      box-shadow: none;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="auth-card shadow-lg">
    <div class="text-center mb-4">
      <a href="index.html" title="Back to Site"><img src="assets/images/logo.svg" alt="Vanguard Logo" class="mb-3" style="height: 40px;"></a>
      <h3 class="text-white fw-bold mb-1">New Operation Signup</h3>
      <p class="text-white-50 small">Register for the Secure Client Portal</p>
    </div>

    <div class="d-flex gap-2 mb-4">
      <button class="btn btn-outline-light w-100 rounded-0 py-2 small d-flex align-items-center justify-content-center gap-2"><i class="bi bi-google"></i> Google</button>
      <button class="btn btn-outline-light w-100 rounded-0 py-2 small d-flex align-items-center justify-content-center gap-2"><i class="bi bi-linkedin"></i> LinkedIn</button>
    </div>

    <div class="d-flex align-items-center my-4">
      <div class="flex-grow-1 border-bottom border-light border-opacity-10"></div>
      <div class="px-3 x-small text-white-50 text-uppercase fw-bold tracking-wider" style="font-size: 0.6rem;">OR RECRUIT INFO</div>
      <div class="flex-grow-1 border-bottom border-light border-opacity-10"></div>
    </div>

    <form action="dashboard.html" method="GET">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label text-white-50 x-small fw-bold text-uppercase">First Name</label>
          <input type="text" class="form-control rounded-0" required>
        </div>
        <div class="col-md-6">
          <label class="form-label text-white-50 x-small fw-bold text-uppercase">Last Name</label>
          <input type="text" class="form-control rounded-0" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label text-white-50 x-small fw-bold text-uppercase">Secure Email</label>
        <input type="email" class="form-control rounded-0" placeholder="personal@encrypted.com" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label text-white-50 x-small fw-bold text-uppercase">Password</label>
          <input type="password" class="form-control rounded-0" placeholder="••••••••" required>
        </div>
        <div class="col-md-6">
          <label class="form-label text-white-50 x-small fw-bold text-uppercase">Confirm Password</label>
          <input type="password" class="form-control rounded-0" placeholder="••••••••" required>
        </div>
      </div>
      
      <div class="form-check mb-4">
        <input class="form-check-input shadow-none" type="checkbox" id="terms" required>
        <label class="form-check-label text-white-50 x-small" for="terms">
          I agree to the <a href="terms.html" class="text-primary-brand text-decoration-none">Operational Terms</a> and NDA.
        </label>
      </div>

      <button type="submit" class="btn btn-primary-brand w-100 py-2 fw-bold rounded-0 mb-3">INITIALIZE ACCOUNT</button>
      
      <p class="text-white-50 small text-center mb-0">Already registered? <a href="login.html" class="text-primary-brand text-decoration-none">Sign In</a></p>
    </form>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
