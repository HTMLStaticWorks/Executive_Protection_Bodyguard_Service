<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VANGUARD - RECRUIT REGISTRATION</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link id="bootstrap-link" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .auth-card {
      max-width: 500px;
    }
  </style>
</head>

<body class="no-scroll">

  <main class="scrollable-content" style="--header-height: 0px;">
    <div class="auth-toggles">
      <button class="theme-toggle btn" aria-label="Toggle Theme"><i class="bi bi-moon-fill"></i></button>
      <button class="rtl-toggle btn" aria-label="Toggle RTL">RTL</button>
    </div>

    <div class="auth-wrapper">
      <div class="auth-card shadow-lg">
        <div class="text-center mb-4">
          <a href="index.html" title="Back to Site"><img src="assets/images/logo.svg" alt="Vanguard Logo" class="mb-3"
              style="height: 40px;"></a>
          <h3 class="fw-bold mb-1">New Operation Signup</h3>
          <p class="text-muted small">Register for the Secure Client Portal</p>
        </div>

        <div class="d-flex gap-2 mb-4">
          <button
            class="btn btn-outline-secondary w-100 rounded-0 py-2 small d-flex align-items-center justify-content-center gap-2"><i
              class="bi bi-google"></i> Google</button>
          <button
            class="btn btn-outline-secondary w-100 rounded-0 py-2 small d-flex align-items-center justify-content-center gap-2"><i
              class="bi bi-apple"></i> Apple</button>
        </div>

        <div class="d-flex align-items-center my-4">
          <div class="flex-grow-1 border-bottom border-light border-opacity-10"></div>
          <div class="px-3 x-small text-muted text-uppercase fw-bold tracking-wider" style="font-size: 0.6rem;">OR
            RECRUIT INFO</div>
          <div class="flex-grow-1 border-bottom border-light border-opacity-10"></div>
        </div>

        <form action="dashboard.html" method="GET">
          <div class="mb-3">
            <label class="form-label text-muted x-small fw-bold text-uppercase">First Name</label>
            <input type="text" class="form-control rounded-0" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted x-small fw-bold text-uppercase">Last Name</label>
            <input type="text" class="form-control rounded-0" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted x-small fw-bold text-uppercase">Secure Email</label>
            <input type="email" class="form-control rounded-0" placeholder="personal@encrypted.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted x-small fw-bold text-uppercase">Password</label>
            <input type="password" class="form-control rounded-0" placeholder="••••••••" required>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted x-small fw-bold text-uppercase">Confirm Password</label>
            <input type="password" class="form-control rounded-0" placeholder="••••••••" required>
          </div>


          <div class="form-check mb-4">
            <input class="form-check-input shadow-none" type="checkbox" id="terms" required>
            <label class="form-check-label text-muted x-small" for="terms">
              I agree to the <a href="terms.html" class="text-primary-brand text-decoration-none">Operational Terms</a>
              and NDA.
            </label>
          </div>

          <button type="submit" class="btn btn-primary-brand w-100 py-2 fw-bold rounded-0 mb-3">INITIALIZE
            ACCOUNT</button>

          <p class="text-muted small text-center mb-0">Already registered? <a href="login.html"
              class="text-primary-brand text-decoration-none">Sign In</a></p>
        </form>
      </div>
    </div>

  </main>
  <script src="assets/js/main.js"></script>

  <button id="back-to-top" class="back-to-top shadow-lg" aria-label="Back to Top">
    <i class="bi bi-chevron-up"></i>
  </button>
</body>

</html>
